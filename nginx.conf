daemon off; 

error_log /dev/stdout warn;
pid /dev/null; 

events {
    worker_connections 1024;
}

http {
    log_format proxy_log '$remote_addr - $remote_user [$time_local] "$request" '
                         'status:$status bytes:$body_bytes_sent '
                         'to_upstream:"$upstream_addr"';
    access_log /dev/stdout proxy_log;

    lua_shared_dict app 1m;

    lua_package_path "lua/?.lua;;";

    upstream svc-users-backend {
        server 127.0.0.1:8088; 
        keepalive 8; 
    }
    upstream svc-auth-backend {
        server 127.0.0.1:8088; 
        keepalive 8; 
    }
    upstream svc-dox-backend {
        server 127.0.0.1:8088; 
        keepalive 8; 
    }
    upstream svc-queue-backend {
        server 127.0.0.1:8088; 
        keepalive 8; 
    }

    init_by_lua_file "lua/init_app.lua";
    lua_code_cache on;
    server {
        listen 127.0.0.1:8080;
        server_name localhost;

        location / {
            set $backend "";
            access_by_lua_file "lua/my_endpoint.lua";

            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header 'Access-Control-Allow-Origin' '*' always;
	        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
	        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
	        add_header 'Access-Control-Max-Age' 600 always;

	        if ($request_method = 'OPTIONS') {
		        add_header 'Access-Control-Allow-Origin' '*' always;
		        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
		        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
		        add_header 'Access-Control-Max-Age' 600 always;

		        add_header 'Content-Type' 'text/plain; charset=utf-8';
        	    add_header 'Content-Length' 0;
        	    return 204;
    	    }

            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        location /sys/reload {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            content_by_lua_file "lua/reload.lua";
        }
    }

    server {
        listen 127.0.0.1:8080;
        server_name 127.0.0.1;

        location / {
            set $backend "";
            access_by_lua_file "lua/noauth_endpoint.lua";

            proxy_pass $backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header 'Access-Control-Allow-Origin' '*' always;
	        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
	        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
	        add_header 'Access-Control-Max-Age' 600 always;

	        if ($request_method = 'OPTIONS') {
		        add_header 'Access-Control-Allow-Origin' '*' always;
		        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
		        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
		        add_header 'Access-Control-Max-Age' 600 always;

		        add_header 'Content-Type' 'text/plain; charset=utf-8';
        	    add_header 'Content-Length' 0;
        	    return 204;
    	    }
            
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        location /sys/reload {
            allow 127.0.0.1;
            allow ::1;
            deny all;
            content_by_lua_file "lua/reload.lua";
        }
    }
}
