services:
  app-dev:
    container_name: svc-gateway-app-dev
    build:
      context: .
      dockerfile: Dockerfile-test
    volumes:
      - ./src:/app/src:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./public.pem:/app/public.pem:ro
      # Кешируем компиляцию (target)
      - cargo-target:/app/target
      # Кешируем скачанные зависимости (индекс и исходники)
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    cap_add:
      - NET_BIND_SERVICE

    networks:
      net:
        ipv6_address: fd98:2dd6:8f48:1d99:615d:6b20::2
      net-exit:
        aliases: []

networks:
  net:
    enable_ipv6: true
    enable_ipv4: false
    driver_opts:
      com.docker.network.driver.mtu: "65535"
    ipam:
      config:
        - subnet: fd98:2dd6:8f48:1d99:615d:6b20::/96
  net-exit: {}

volumes:
  cargo-cache:
  cargo-git:
  cargo-target:
